id: certin-annexure-a
name: CERT-In Annexure-A VAPT Report
region: India
audience: CERT-In empaneled auditors
status: production-ready
output_format: docx
sections:
  - 01-cover-page
  - 03-executive-summary
  - 04-scope-statement
  - 06-testing-methodology
  - 07-standards-adopted
  - 08-team-roster
  - 09-tools-used
  - 11-summary-of-findings
  - 12-key-observations
  - 13-aggregated-findings-table
  - 14-per-finding-details
  - 21-limitations
  - 22-references
report_title: "VAPT Report (Annexure-A format)"
official_sources:
  - https://www.cert-in.org.in/PDF/Comprehensive_Cyber_Security_Audit_Policy_Guidelines.pdf
  - https://www.cert-in.org.in/PDF/Empanel_org.pdf
finding_id_format: "001"
hard_rules:
  - "Blank fields are not permitted; use 'N/A' or 'None' for inapplicable text fields"
  - "Every finding requires visible PoC screenshots; name-only entries are rejected"
  - "Separate report per testbed / machine / application"
