id: germany-bsi-grundschutz
name: Auditbericht im Rahmen der Zertifizierung nach ISO 27001 auf der Basis von IT-Grundschutz
region: Germany — Bundesamt für Sicherheit in der Informationstechnik (BSI)
audience: |
  BSI-licensed ISO 27001 IT-Grundschutz auditors (Auditteamleiter) only; auditor
  must be individually certified by BSI (Personenzertifizierung@bsi.bund.de) and
  listed on the public BSI auditor registry; Unabhängigkeitserklärung
  (declaration of independence) required from every auditor.
status: production-ready
output_format: |
  docx / odt (BSI publishes the official "Muster Auditbericht" template in both
  .docx and .odt; submission to BSI via gs-zert@bsi.bund.de or De-Mail).
sections:
  - 01-cover-page
  - 02-document-control
  - 03-executive-summary
  - 04-scope-statement
  - 05-out-of-scope
  - 06-testing-methodology
  - 07-standards-adopted
  - 10-risk-rating-methodology
  - 11-summary-of-findings
  - 14-per-finding-details
  - 15-controls-matrix
  - 18-threat-landscape
  - 19-compliance-statement
  - 20-remediation-roadmap
  - 21-limitations
  - 22-references
  - 23-appendices
  - 24-glossary
  - 25-acronyms
  - 26-signoff
report_title: "Auditbericht im Rahmen der Zertifizierung nach ISO 27001 auf der Basis von IT-Grundschutz"
official_sources:
  - https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Standards-und-Zertifizierung/IT-Grundschutz/it-grundschutz_node.html
  - https://www.bsi.bund.de/SharedDocs/Downloads/DE/BSI/Grundschutz/Zertifikat/ISO27001/Auditierungsschema_Kompendium.pdf
  - https://www.bsi.bund.de/SharedDocs/Downloads/DE/BSI/Grundschutz/Zertifikat/ISO27001/Muster_Auditbericht_Kompendium.docx
  - https://www.bsi.bund.de/EN/Themen/Unternehmen-und-Organisationen/Standards-und-Zertifizierung/Zertifizierung-und-Anerkennung/Zertifizierung-von-Managementsystemen/ISO-27001-Basis-IT-Grundschutz/Auditoren/iso27001auditoren_node.html
finding_id_format: "Abweichungen keyed to specific Bausteine (modules) of the IT-Grundschutz-Kompendium — e.g. ORP.4.A1 or SYS.2.1.A6 — with a unique reference tied to the module/requirement number"
hard_rules:
  - "Auditbericht MUST be created on the basis of the current BSI 'Muster für Auditberichte' template and approved/released by the certification body (§ Auditierungsschema 4.7) — free-form reports are rejected"
  - "Audit split into two formal phases — Phase 1: Dokumentenprüfung (document review); Phase 2: Umsetzungsprüfung vor Ort (on-site implementation check) (§4.1, §4.4)"
  - "Seven reference documents A.0–A.6 MUST be provided by the applicant: Leitlinie (A.0), Strukturanalyse (A.1), Schutzbedarfsfeststellung (A.2), Modellierung (A.3), IT-Grundschutz-Check (A.4), Risikoanalyse (A.5), Realisierungsplan (A.6)"
  - "Prerequisite for certification: implementation of Standard-Absicherung OR Kern-Absicherung per BSI-Standard 200-2 — Basis-Absicherung alone is NOT certifiable"
  - "Auditteamleiter MUST submit Unabhängigkeitserklärungen for every team member before the Zertifizierungsantrag is accepted (§2 Überblick)"
  - "Berufsethik principles (§3) MUST be observed: Ethisches Verhalten, Fachkompetenz, Vertrauenswürdigkeit, Sachliche Darstellung — report MUST provide 'nachvollziehbare Methodik' (traceable methodology) for every conclusion"
severity_classification: |
  Findings classified as "Abweichungen" with severity tiers and "Empfehlungen"
  (recommendations). Each Abweichung mapped to a specific control of the
  IT-Grundschutz-Kompendium; auditor renders a Gesamtvotum (overall verdict):
  geeignet / nicht geeignet for certification. Prior-audit Abweichungen MUST be
  re-examined across re-certification cycles.
control_status_enum: [Erfüllt, Teilweise erfüllt, Nicht erfüllt, Entbehrlich]
control_catalogue_reference: |
  IT-Grundschutz-Kompendium (current edition — only German version qualifies for
  certification). BSI Standards 200-1 (ISMS general requirements), 200-2 (three
  Absicherungsvarianten: Basis-, Kern-, Standard-Absicherung), 200-3
  (Risikoanalyse), 100-4 (BCM). Modules in ten layers: ISMS, ORP, CON, OPS, DER,
  APP, SYS, IND, NET, INF.
unique_aspects: |
  One of the only national schemes where the report is part of a state-recognised
  certification — the ISO/IEC 27001 certificate is issued by BSI (not a private
  CB), the Auditbericht is reviewed and accepted by BSI's Zertifizierungsstelle,
  and only audits implementing Standard- or Kern-Absicherung produce a certificate.
submission_requirements:
  - "Language: German (only the German edition of the IT-Grundschutz-Kompendium qualifies for certification)"
  - "Submission to BSI is digital — gs-zert@bsi.bund.de or De-Mail (paper submission no longer accepted)"
  - "Auditbericht delivered using the official Muster Auditbericht template (current version, freely downloadable from BSI website)"
  - "All reference documents A.0–A.6 attached as Bestandteil des Auditberichts"
  - "Certificate validity is 3 years; re-certification audit MUST reference the prior Auditbericht's Abweichungen and Empfehlungen"
languages:
  - de (mandatory for BSI submission)
  - en (international engagements only — does not qualify for BSI certificate)
