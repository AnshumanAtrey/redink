id: pci-dss-roc
name: PCI DSS Report on Compliance (ROC) v4.0.1
region: Global — PCI Security Standards Council (PCI SSC)
audience: |
  Merchants and service providers required by acquirer or payment brand to
  undergo full PCI DSS assessment (Level 1 merchants >6M Visa/MC txns/yr;
  all Level 1 service providers). Must be completed by a Qualified Security
  Assessor (QSA) employed by a PCI SSC-listed QSA Company, OR by an Internal
  Security Assessor (ISA) for permitted self-assessments.
status: production-ready
output_format: |
  PCI SSC DOCX template (issued to QSAs via PCI Portal) producing final PDF ROC
  (~400-500+ pages typical). Accompanied by signed Attestation of Compliance
  (AOC). Word version restricted to QSAs; non-assessor PDF reference copy
  publicly available.
sections:
  - 01-cover-page
  - 02-document-control
  - 03-executive-summary
  - 04-scope-statement
  - 05-out-of-scope
  - 08-team-roster
  - 11-summary-of-findings
  - 14-per-finding-details
  - 15-controls-matrix
  - 16-compensating-controls
  - 19-compliance-statement
  - 20-remediation-roadmap
  - 21-limitations
  - 22-references
  - 23-appendices
  - 26-signoff
report_title: "PCI DSS v4.0.1 Report on Compliance Template (Aug 28, 2024 release)"
official_sources:
  - https://www.pcisecuritystandards.org/document_library/
  - https://blog.pcisecuritystandards.org/pci-ssc-releases-roc-template-for-pci-dss-v4-0-1
  - https://www.pcisecuritystandards.org/documents/QSA_Program_Guide_v2.0_Dec.pdf
finding_id_format: "PCI DSS requirement numbering (e.g., 1.2.1, 3.5.1.2, 8.3.6, A1.1.1) — each sub-requirement assessed individually"
hard_rules:
  - "Every sub-requirement marked: In Place / In Place with Remediation / Not Applicable / Not Tested / Not in Place — per ROC Template Part II"
  - "Each finding must list rationale + reference numbers for ALL supporting evidence (Part I evidence catalog) — ROC Template instructions"
  - "Two assessment methods permitted: Defined Approach OR Customized Approach; Customized Approach requires Appendix E template per requirement — PCI DSS v4.0.1 §8"
  - "Compensating Controls (Defined Approach only) require Appendix C worksheet with business/technical constraint justification"
  - "Compliance valid for 12 months — annual reassessment required by PCI DSS Program"
  - "Sensitive Authentication Data (SAD) storage testing + remote testing details mandatory in v4.0.1 (new vs v3.2.1)"
  - "ROC must be signed by Lead QSA; ISAs may sign only when entity is performing self-assessment permitted by acquirer/brand"
severity_classification: |
  Per-requirement status: In Place / In Place with Remediation / Not Applicable
  / Not Tested / Not in Place. Overall ROC outcome: Compliant / Non-Compliant
  / Compliant but with Legal Exception. Controls-conformance model — Req 11
  ASV scans use CVSS separately.
control_status_enum: [In Place, In Place with Remediation, Not Applicable, Not Tested, Not in Place]
control_catalogue_reference: |
  PCI DSS v4.0.1 — 12 high-level Requirements expanded into ~300+ sub-
  requirements, plus Appendix A1 (multi-tenant providers), A2 (SSL/early TLS),
  A3 (DESV — Designated Entities Supplemental Validation).
unique_aspects: |
  Hybrid prescriptive + risk-based model: v4.0.1 introduces Customized Approach
  allowing entities to define their own implementation if they document a
  Targeted Risk Analysis meeting the Customized Approach Objective. ~492-page
  template makes it the most procedurally rigid commercial audit report.
submission_requirements:
  - "QSA delivers signed ROC + Attestation of Compliance (AOC) to assessed entity"
  - "Entity submits ROC + AOC to acquiring bank (merchants) or to payment brand (service providers on Visa/Mastercard/AmEx/Discover/JCB registries)"
  - "AOC must be signed by entity executive officer AND Lead QSA (or ISA)"
  - "Service providers also submit AOC for listing on Visa Global Registry / Mastercard SDP"
  - "Re-assessment annually; quarterly ASV scans (Req 11.3.2) submitted separately by Approved Scanning Vendor"
