id: pci-dss-roc
name: PCI DSS Report on Compliance (ROC)
region: Global (cardholder data environments)
audience: PCI Qualified Security Assessors (QSAs) and Internal Security Assessors (ISAs)
status: skeleton
output_format: docx
sections:
  - 01-cover-page
  - 02-document-control
  - 03-executive-summary
  - 04-scope-statement
  - 05-out-of-scope
  - 08-team-roster
  - 11-summary-of-findings
  - 14-per-finding-details
  - 15-controls-matrix
  - 16-compensating-controls
  - 19-compliance-statement
  - 20-remediation-roadmap
  - 21-limitations
  - 22-references
  - 23-appendices
  - 26-signoff
report_title: "PCI DSS Report on Compliance"
official_sources:
  - https://listings.pcisecuritystandards.org/documents/PCI-DSS-v4-0-DESV-S-ROC-Template.pdf
  - https://blog.pcisecuritystandards.org/pci-ssc-releases-roc-template-for-pci-dss-v4-0-1
  - https://www.pcisecuritystandards.org/document_library/
finding_id_format: "PCI-001"
hard_rules:
  - "Use of PCI SSC's mandatory ROC template is required for v3.2+ submissions"
  - "Each of the 12 PCI DSS requirements must be assessed against; missing requirements cannot be skipped"
  - "Compensating Controls Worksheet documented per PCI SSC format (see §16)"
control_status_enum: [In Place, Not In Place, Not Applicable, Not Tested, Compensating Control]
